<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Decile → Google Sheets</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height:100vh; background:#0a0a0f; font-family:'DM Mono',monospace; color:#e8e8e8; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
  h1 { font-family:'Syne',sans-serif; font-size:34px; font-weight:800; letter-spacing:-1px; }
  .label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#444; margin-bottom:8px; }
  .card { width:100%; max-width:580px; }
  .drop-zone { border:1px dashed #2a2a2a; border-radius:8px; padding:36px 24px; text-align:center; cursor:pointer; transition:all 0.2s; background:rgba(255,255,255,0.01); margin-bottom:20px; }
  .drop-zone.over,.drop-zone:hover,.drop-zone.loaded { border-color:#4ade80; background:rgba(74,222,128,0.04); }
  input[type=file] { display:none; }
  .btn { width:100%; padding:14px; background:#4ade80; color:#0a0f0a; border:none; border-radius:8px; font-size:13px; font-weight:600; font-family:'DM Mono',monospace; letter-spacing:1px; cursor:pointer; transition:all 0.15s; margin-top:8px; }
  .btn:hover { transform:translateY(-1px); background:#6ee7a0; }
  .btn:disabled { background:#1a1a1a; color:#333; cursor:not-allowed; transform:none; }
  .preview-table { border:1px solid #1a1a1a; border-radius:8px; overflow:hidden; margin-bottom:20px; }
  .preview-header { display:grid; grid-template-columns:1fr 1fr auto; background:#111; padding:8px 16px; font-size:10px; color:#444; letter-spacing:1px; text-transform:uppercase; }
  .preview-row { display:grid; grid-template-columns:1fr 1fr auto; padding:10px 16px; font-size:12px; border-top:1px solid #111; }
  .ellipsis { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-right:8px; }
  .msg { border-radius:8px; padding:20px; text-align:center; margin-top:16px; }
  .msg-success { background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.2); }
  .msg-error { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); color:#ef4444; font-size:13px; }
  .step-block { margin-bottom:20px; }
  .separator { height:1px; background:#1a1a1a; margin:24px 0; }
  .header { text-align:center; margin-bottom:40px; }
  .tag { font-size:11px; letter-spacing:4px; color:#4ade80; margin-bottom:12px; text-transform:uppercase; }
  .sub { color:#444; font-size:13px; margin-top:8px; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #333; border-top-color:#4ade80; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #status { margin-top:12px; font-size:12px; color:#555; min-height:18px; }
  .auth-ok { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.2); border-radius:8px; padding:12px 16px; font-size:12px; color:#4ade80; margin-bottom:8px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="tag">Geek Ventures</div>
    <h1>Decile → Sheets</h1>
    <p class="sub">Загрузи CSV — данные уйдут в Google Sheets</p>
  </div>

  <div class="step-block">
    <div class="label">01 — Подключи Google аккаунт</div>
    <div id="g_id_signin"></div>
    <div id="auth-status"></div>
  </div>

  <div class="separator"></div>

  <div class="step-block">
    <div class="label">02 — CSV файл из Decile</div>
    <label for="csv-input">
      <div class="drop-zone" id="drop-zone"
        ondragover="event.preventDefault();this.classList.add('over')"
        ondragleave="this.classList.remove('over')"
        ondrop="handleDrop(event)">
        <div id="drop-text">
          <div style="font-size:28px;opacity:0.2;margin-bottom:8px;">⬆</div>
          <div style="font-size:13px;color:#555;">Перетащи CSV или кликни</div>
          <div style="font-size:11px;color:#333;margin-top:4px;">Capital Call Export из Decile Hub</div>
        </div>
      </div>
    </label>
    <input type="file" id="csv-input" accept=".csv" onchange="handleFile(this.files[0])">
  </div>

  <div id="preview-block" style="display:none">
    <div class="label" id="preview-label">03 — Предпросмотр</div>
    <div class="preview-table">
      <div class="preview-header"><span>LP Name</span><span>Email</span><span>Committed</span></div>
      <div id="preview-rows"></div>
    </div>
    <button class="btn" id="btn-push" onclick="pushToSheets()">ВСТАВИТЬ В GOOGLE SHEETS →</button>
    <div id="status"></div>
  </div>

  <div id="msg-block"></div>
</div>

<script>
  const CLIENT_ID = '1021263067576-g0r632sd80go08o9tmfstruhsje1tv5t.apps.googleusercontent.com';
  const SHEET_ID  = '1ccOjXAxGPsGYeEIwAt4plIm1t1hni0C_zTuoz-TbH7U';
  const SHEET_NAME = 'Sheet1';

  let accessToken = null;
  let parsedRows  = [];

  window.onload = function() {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      callback: (resp) => {
        if (resp.error) { showError('Ошибка авторизации: ' + resp.error); return; }
        accessToken = resp.access_token;
        document.getElementById('auth-status').innerHTML =
          '<div class="auth-ok">✓ Google подключён — mykyta@geek.vc</div>';
        document.getElementById('signin-btn').style.display = 'none';
      }
    });
    document.getElementById('g_id_signin').innerHTML =
      '<button class="btn" id="signin-btn" onclick="doAuth()">ВОЙТИ ЧЕРЕЗ GOOGLE →</button>';
  };

  function doAuth() {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      callback: (resp) => {
        if (resp.error) { showError('Ошибка: ' + resp.error); return; }
        accessToken = resp.access_token;
        document.getElementById('auth-status').innerHTML =
          '<div class="auth-ok">✓ Google подключён</div>';
        document.getElementById('signin-btn').style.display = 'none';
      }
    }).requestAccessToken();
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('over');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  }

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const rows = parseCSV(e.target.result);
        if (rows.length < 2) { showError('CSV пустой'); return; }
        const h = rows[0];
        const ni = h.indexOf('LP Name'), ei = h.indexOf('LP Email'), ci = h.indexOf('Commitment');
        if (ni<0||ei<0||ci<0) { showError('Не найдены колонки LP Name / LP Email / Commitment'); return; }
        parsedRows = [];
        for (let i=1;i<rows.length;i++) {
          const r=rows[i], name=(r[ni]||'').trim(), email=(r[ei]||'').trim();
          const num=parseFloat((r[ci]||'').replace(/[$,]/g,''));
          const committed=isNaN(num)?'':'$'+num.toLocaleString('en-US');
          if (name) parsedRows.push({name,email,committed});
        }
        showPreview(file.name);
      } catch(err) { showError('Ошибка: '+err.message); }
    };
    reader.readAsText(file,'UTF-8');
  }

  function showPreview(filename) {
    const dz=document.getElementById('drop-zone');
    dz.classList.add('loaded');
    document.getElementById('drop-text').innerHTML=
      `<div style="color:#4ade80;font-size:13px;">✓ ${filename}</div>
       <div style="color:#444;font-size:11px;margin-top:4px;">${parsedRows.length} LP найдено</div>`;
    document.getElementById('preview-label').textContent=`03 — Предпросмотр (${parsedRows.length} LP)`;
    document.getElementById('preview-rows').innerHTML=
      parsedRows.slice(0,6).map(r=>
        `<div class="preview-row">
          <span class="ellipsis">${r.name}</span>
          <span class="ellipsis" style="color:#666">${r.email}</span>
          <span style="color:#4ade80;white-space:nowrap">${r.committed}</span>
        </div>`).join('')+
      (parsedRows.length>6?`<div style="padding:8px 16px;font-size:11px;color:#333;border-top:1px solid #111;text-align:center">+ ещё ${parsedRows.length-6} LP</div>`:'');
    document.getElementById('preview-block').style.display='block';
  }

  async function pushToSheets() {
    if (!accessToken) { showError('Сначала войди через Google'); return; }
    const btn=document.getElementById('btn-push');
    const st=document.getElementById('status');
    btn.disabled=true;
    st.innerHTML='<span class="spinner"></span>Очищаем лист...';
    try {
      const clearRes=await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!B2:G200:clear`,
        {method:'POST',headers:{Authorization:`Bearer ${accessToken}`}});
      if (!clearRes.ok) throw new Error('Ошибка очистки: '+clearRes.status);
      st.innerHTML='<span class="spinner"></span>Вставляем данные...';
      const values=parsedRows.map(r=>[r.name,'','',r.email,r.committed,r.committed]);
      const upRes=await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!B2:G${1+values.length}?valueInputOption=USER_ENTERED`,
        {method:'PUT',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},
         body:JSON.stringify({values})});
      if (!upRes.ok) { const e=await upRes.json(); throw new Error(e.error?.message||'Ошибка вставки'); }
      st.innerHTML='';
      document.getElementById('msg-block').innerHTML=
        `<div class="msg msg-success">
          <div style="font-size:24px;margin-bottom:8px;">✓</div>
          <div style="color:#4ade80;font-size:14px;font-weight:500">${parsedRows.length} LP успешно вставлено!</div>
          <div style="color:#444;font-size:12px;margin-top:4px;">Открой Google Sheets и проверь</div>
          <button onclick="location.reload()" style="margin-top:16px;background:transparent;border:1px solid #2a2a2a;color:#555;border-radius:6px;padding:8px 20px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer">Загрузить другой файл</button>
        </div>`;
    } catch(err) { btn.disabled=false; st.innerHTML=''; showError(err.message); }
  }

  function parseCSV(text) {
    const rows=[];
    for (let line of text.split('\n')) {
      line=line.replace(/\r$/,'');
      if (!line.trim()) continue;
      const fields=[]; let cur='',inQ=false;
      for (const ch of line) {
        if (ch==='"') inQ=!inQ;
        else if (ch===','&&!inQ) { fields.push(cur.trim()); cur=''; }
        else cur+=ch;
      }
      fields.push(cur.trim());
      rows.push(fields);
    }
    return rows;
  }

  function showError(msg) {
    document.getElementById('msg-block').innerHTML=
      `<div class="msg msg-error">⚠ ${msg}</div>`;
  }
</script>
</body>
</html>
