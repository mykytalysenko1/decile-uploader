<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decile → Google Sheets</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    font-family: 'DM Mono', monospace;
    color: #e8e8e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  h1 { font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 800; letter-spacing: -1px; }
  .label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #444; margin-bottom: 8px; }
  .green { color: #4ade80; }
  .card { width: 100%; max-width: 580px; }
  .drop-zone {
    border: 1px dashed #2a2a2a;
    border-radius: 8px;
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.01);
    margin-bottom: 20px;
  }
  .drop-zone.over, .drop-zone:hover { border-color: #4ade80; background: rgba(74,222,128,0.03); }
  .drop-zone.loaded { border-color: #4ade80; background: rgba(74,222,128,0.04); }
  input[type=file] { display: none; }
  .input-field {
    width: 100%;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 12px 14px;
    color: #e8e8e8;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    outline: none;
    margin-bottom: 8px;
  }
  .input-field:focus { border-color: #4ade80; }
  .btn {
    width: 100%;
    padding: 14px;
    background: #4ade80;
    color: #0a0f0a;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-1px); background: #6ee7a0; }
  .btn:disabled { background: #1a1a1a; color: #333; cursor: not-allowed; transform: none; }
  .btn-outline {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #555;
    font-size: 12px;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }
  .btn-outline:hover { border-color: #444; color: #888; }
  .preview-table { border: 1px solid #1a1a1a; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
  .preview-header { display: grid; grid-template-columns: 1fr 1fr auto; background: #111; padding: 8px 16px; font-size: 10px; color: #444; letter-spacing: 1px; text-transform: uppercase; }
  .preview-row { display: grid; grid-template-columns: 1fr 1fr auto; padding: 10px 16px; font-size: 12px; border-top: 1px solid #111; }
  .preview-row:nth-child(odd) { background: rgba(255,255,255,0.01); }
  .ellipsis { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
  .msg { border-radius: 8px; padding: 20px; text-align: center; margin-top: 16px; }
  .msg-success { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); }
  .msg-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; font-size: 13px; }
  .hint { font-size: 11px; color: #333; margin-top: 6px; }
  .step-block { margin-bottom: 20px; }
  .separator { height: 1px; background: #1a1a1a; margin: 24px 0; }
  .header { text-align: center; margin-bottom: 40px; }
  .tag { font-size: 11px; letter-spacing: 4px; color: #4ade80; margin-bottom: 12px; text-transform: uppercase; }
  .sub { color: #444; font-size: 13px; margin-top: 8px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status { margin-top: 12px; font-size: 12px; color: #555; min-height: 18px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="tag">Geek Ventures</div>
    <h1>Decile → Sheets</h1>
    <p class="sub">Загрузи CSV — данные уйдут в Google Sheets</p>
  </div>

  <!-- STEP 1: AUTH -->
  <div class="step-block" id="step-auth">
    <div class="label">01 — Подключи Google аккаунт</div>
    <button class="btn" id="btn-auth" onclick="startAuth()">ВОЙТИ ЧЕРЕЗ GOOGLE →</button>
    <p class="hint" style="margin-top:8px;">Нужен доступ к Google Sheets для записи данных</p>
  </div>

  <div class="separator"></div>

  <!-- STEP 2: FILE -->
  <div class="step-block">
    <div class="label">02 — CSV файл из Decile</div>
    <label for="csv-input">
      <div class="drop-zone" id="drop-zone"
        ondragover="event.preventDefault(); this.classList.add('over')"
        ondragleave="this.classList.remove('over')"
        ondrop="handleDrop(event)">
        <div id="drop-text">
          <div style="font-size:28px;opacity:0.2;margin-bottom:8px;">⬆</div>
          <div style="font-size:13px;color:#555;">Перетащи CSV или кликни</div>
          <div style="font-size:11px;color:#333;margin-top:4px;">Capital Call Export из Decile Hub</div>
        </div>
      </div>
    </label>
    <input type="file" id="csv-input" accept=".csv" onchange="handleFile(this.files[0])">
  </div>

  <!-- PREVIEW -->
  <div id="preview-block" style="display:none">
    <div class="label" id="preview-label">03 — Предпросмотр</div>
    <div class="preview-table">
      <div class="preview-header"><span>LP Name</span><span>Email</span><span>Committed</span></div>
      <div id="preview-rows"></div>
    </div>
    <button class="btn" id="btn-push" onclick="pushToSheets()">ВСТАВИТЬ В GOOGLE SHEETS →</button>
    <div id="status"></div>
  </div>

  <div id="msg-block"></div>
</div>

<script>
  // Google OAuth settings
  const CLIENT_ID = '1021263067576-g0r632sd80go08o9tmfstruhsje1tv5t.apps.googleusercontent.com'; // будет заполнен пользователем
  const SHEET_ID = '1ccOjXAxGPsGYeEIwAt4plIm1t1hni0C_zTuoz-TbH7U';
  const SHEET_NAME = 'Sheet1';
  const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

  let accessToken = null;
  let parsedRows = [];

  // --- AUTH via Google Identity Services ---
  function startAuth() {
    // Загружаем Google Identity Services
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => {
      // Используем implicit flow через popup
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${encodeURIComponent(getClientId())}&` +
        `redirect_uri=${encodeURIComponent(location.href.split('?')[0])}&` +
        `response_type=token&` +
        `scope=${encodeURIComponent(SCOPES)}&` +
        `prompt=consent`;

      const popup = window.open(authUrl, 'google-auth', 'width=500,height=600');

      // Слушаем redirect с токеном
      const timer = setInterval(() => {
        try {
          if (popup.closed) { clearInterval(timer); return; }
          const url = popup.location.href;
          if (url.includes('access_token=')) {
            clearInterval(timer);
            popup.close();
            const params = new URLSearchParams(url.split('#')[1] || url.split('?')[1]);
            accessToken = params.get('access_token');
            onAuthSuccess();
          }
        } catch(e) { /* cross-origin, ignore */ }
      }, 300);
    };
    document.head.appendChild(script);
  }

  function getClientId() { return CLIENT_ID; // PATCHED
    // Prompt user for client ID if not set
    if (!window._gclientId) {
      window._gclientId = prompt(
        'Вставь Google OAuth Client ID:\n\n' +
        '1. Открой console.cloud.google.com\n' +
        '2. APIs & Services → Credentials\n' +
        '3. Create → OAuth Client ID → Web Application\n' +
        '4. Authorized JS origins: добавь этот URL\n' +
        '5. Скопируй Client ID'
      );
    }
    return window._gclientId;
  }

  function onAuthSuccess() {
    document.getElementById('btn-auth').textContent = '✓ Google подключён';
    document.getElementById('btn-auth').disabled = true;
    document.getElementById('btn-auth').style.background = 'rgba(74,222,128,0.15)';
    document.getElementById('btn-auth').style.color = '#4ade80';
  }

  // --- CSV PARSING ---
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const rows = parseCSV(e.target.result);
        if (rows.length < 2) { showError('CSV пустой'); return; }
        const headers = rows[0];
        const ni = headers.indexOf('LP Name');
        const ei = headers.indexOf('LP Email');
        const ci = headers.indexOf('Commitment');
        if (ni === -1 || ei === -1 || ci === -1) {
          showError('Не найдены колонки LP Name / LP Email / Commitment');
          return;
        }
        parsedRows = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const name = (r[ni] || '').trim();
          const email = (r[ei] || '').trim();
          const committed = formatMoney(r[ci]);
          if (!name) continue;
          parsedRows.push({ name, email, committed });
        }
        showPreview(file.name);
      } catch(err) {
        showError('Ошибка: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  }

  function parseCSV(text) {
    const rows = [];
    for (let line of text.split('\n')) {
      line = line.replace(/\r$/, '');
      if (!line.trim()) continue;
      const fields = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') inQ = !inQ;
        else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
        else cur += ch;
      }
      fields.push(cur.trim());
      rows.push(fields);
    }
    return rows;
  }

  function formatMoney(val) {
    if (!val && val !== 0) return '';
    const num = parseFloat(String(val).replace(/[$,]/g, ''));
    if (isNaN(num)) return '';
    return '$' + num.toLocaleString('en-US');
  }

  function showPreview(filename) {
    const dz = document.getElementById('drop-zone');
    dz.classList.add('loaded');
    document.getElementById('drop-text').innerHTML = `
      <div style="font-size:18px;color:#4ade80;margin-bottom:6px;">✓</div>
      <div style="color:#4ade80;font-size:13px;">${filename}</div>
      <div style="color:#444;font-size:11px;margin-top:4px;">${parsedRows.length} LP найдено</div>
    `;

    document.getElementById('preview-label').textContent =
      `03 — Предпросмотр (${parsedRows.length} LP)`;

    const previewRows = document.getElementById('preview-rows');
    previewRows.innerHTML = parsedRows.slice(0, 6).map((r, i) => `
      <div class="preview-row">
        <span class="ellipsis">${r.name}</span>
        <span class="ellipsis" style="color:#666">${r.email}</span>
        <span style="color:#4ade80;white-space:nowrap">${r.committed}</span>
      </div>
    `).join('') + (parsedRows.length > 6 ? `
      <div style="padding:8px 16px;font-size:11px;color:#333;border-top:1px solid #111;text-align:center">
        + ещё ${parsedRows.length - 6} LP
      </div>` : '');

    document.getElementById('preview-block').style.display = 'block';
  }

  // --- PUSH TO SHEETS ---
  async function pushToSheets() {
    if (!accessToken) {
      showError('Сначала войди через Google (шаг 01)');
      return;
    }

    const btn = document.getElementById('btn-push');
    const statusEl = document.getElementById('status');
    btn.disabled = true;
    statusEl.innerHTML = '<span class="spinner"></span>Очищаем лист...';

    try {
      // 1. Очищаем колонки B:G начиная со строки 2
      const clearRes = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!B2:G200:clear`,
        { method: 'POST', headers: { Authorization: `Bearer ${accessToken}` } }
      );
      if (!clearRes.ok) throw new Error('Ошибка очистки: ' + clearRes.status);

      statusEl.innerHTML = '<span class="spinner"></span>Вставляем данные...';

      // 2. Формируем данные для вставки
      const values = parsedRows.map(r => [
        r.name,      // B - LP name
        '',          // C - Contact Name (пусто)
        '',          // D - First Name (пусто)
        r.email,     // E - LP email
        r.committed, // F - LP committed
        r.committed  // G - LP investment signed
      ]);

      // 3. Вставляем
      const updateRes = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!B2:G${1 + values.length}?valueInputOption=USER_ENTERED`,
        {
          method: 'PUT',
          headers: {
            Authorization: `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ values })
        }
      );
      if (!updateRes.ok) {
        const err = await updateRes.json();
        throw new Error(err.error?.message || 'Ошибка вставки');
      }

      statusEl.innerHTML = '';
      document.getElementById('msg-block').innerHTML = `
        <div class="msg msg-success">
          <div style="font-size:24px;margin-bottom:8px;">✓</div>
          <div style="color:#4ade80;font-size:14px;font-weight:500">${parsedRows.length} LP успешно вставлено!</div>
          <div style="color:#444;font-size:12px;margin-top:4px;">Открой Google Sheets и проверь</div>
          <button class="btn-outline" style="margin-top:16px" onclick="location.reload()">Загрузить другой файл</button>
        </div>`;

    } catch(err) {
      btn.disabled = false;
      statusEl.innerHTML = '';
      showError(err.message);
    }
  }

  function showError(msg) {
    document.getElementById('msg-block').innerHTML = `
      <div class="msg msg-error">⚠ ${msg}</div>`;
  }
</script>
</body>
</html>
